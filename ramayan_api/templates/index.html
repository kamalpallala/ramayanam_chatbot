<!DOCTYPE html>
<html>

<head>
    <title>Ramayan AI Chatbot</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
        }

        .container{
            width:700px;
            margin:auto;
            margin-top:100px;
            background:white;
            padding:30px;
            border-radius:10px;
        }

        input{
            width:80%;
            padding:10px;
        }

        button{
            padding:10px;
        }

        .answer{
            margin-top:20px;
            background:#eeeeee;
            padding:15px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Ramayan AI Chatbot</h1>

        <form method="POST">

            <input
                type="text"
                name="question"
                placeholder="Ask something..."
            >

            <button type="submit">
                Send
            </button>

        </form>

        <div class="answer">
            {{ answer }}
        </div>

    </div>

</body>

</html>
